<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Source Library</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:"Outfit",sans-serif;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:80px 20px;
overflow-x:hidden;
position:relative;

background:
linear-gradient(180deg,#faf6f0,#f4eee5);
}

/* Aurora background */

body::before{
content:"";
position:fixed;
inset:0;

background:
radial-gradient(circle at 20% 30%,rgba(255,210,230,.25),transparent 40%),
radial-gradient(circle at 80% 70%,rgba(200,220,255,.25),transparent 40%),
radial-gradient(circle at 50% 0%,rgba(230,213,184,.4),transparent 50%);

filter:blur(40px);
z-index:0;
}

/* floral ornament */

.floral{
position:fixed;
width:220px;
opacity:.08;
z-index:0;
}

.floral.left{
top:40px;
left:40px;
transform:rotate(-20deg);
}

.floral.right{
bottom:40px;
right:40px;
transform:rotate(20deg);
}

/* floating book pages */

.page{
position:fixed;
font-size:40px;
opacity:.15;
animation:float 18s linear infinite;
z-index:0;
}

.page:nth-child(1){left:8%;bottom:-50px;}
.page:nth-child(2){left:90%;bottom:-80px;animation-duration:22s;}
.page:nth-child(3){left:50%;bottom:-60px;animation-duration:20s;}

@keyframes float{
0%{
transform:translateY(0) rotate(0deg);
opacity:.15;
}
100%{
transform:translateY(-120vh) rotate(360deg);
opacity:0;
}
}

/* container */

.wrapper{
position:relative;
z-index:2;
text-align:center;
max-width:820px;
width:100%;
}

/* title */

h1{
font-size:36px;
color:#800000;
margin-bottom:30px;
}

/* glass card */

.card{

padding:40px;

border-radius:22px;

background:rgba(255,255,255,.65);
backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.4);

box-shadow:
0 20px 60px rgba(0,0,0,.15);

transition:.4s;
}

.card:hover{
transform:translateY(-6px);
}

/* photo */

.card img{

width:170px;
height:170px;

border-radius:50%;

object-fit:cover;

border:4px solid #800000;

margin-bottom:16px;

box-shadow:0 10px 30px rgba(0,0,0,.25);
}

/* name */

.card h3{
font-size:24px;
color:#800000;
margin-bottom:6px;
}

.card p{
color:#444;
line-height:1.6;
margin-bottom:10px;
}

/* buttons */

.links{
margin-top:15px;
}

.links a{

display:inline-block;

margin:8px;

background:#800000;

color:#fff;

padding:10px 20px;

border-radius:25px;

font-weight:600;

text-decoration:none;

transition:.25s;
}

.links a:hover{
background:#a52a2a;
transform:translateY(-2px);
}

/* video */

iframe{

width:100%;

height:400px;

margin-top:20px;

border:none;

border-radius:12px;

box-shadow:0 10px 25px rgba(0,0,0,.2);
}

/* back */

.back{

display:inline-block;

margin-top:25px;

color:#800000;

font-weight:600;

text-decoration:none;
}

.back:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<img class="floral left" src="https://upload.wikimedia.org/wikipedia/commons/3/3f/Floral_ornament.svg">
<img class="floral right" src="https://upload.wikimedia.org/wikipedia/commons/3/3f/Floral_ornament.svg">

<div class="page">📖</div>
<div class="page">📚</div>
<div class="page">📄</div>
