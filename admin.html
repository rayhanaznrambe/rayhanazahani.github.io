<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin - Source Library</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:"Outfit",system-ui;
background:linear-gradient(180deg,#faf6f0,#f4eee5);
min-height:100vh;
padding:80px 20px;
display:flex;
justify-content:center;
overflow-x:hidden;
position:relative;
}

/* ===== AURORA GRADIENT ===== */

body::before{
content:"";
position:fixed;
inset:0;

background:
radial-gradient(circle at 20% 40%, rgba(200,220,255,0.15), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(255,210,230,0.15), transparent 40%),
radial-gradient(circle at 50% 0%, rgba(230,213,184,0.25), transparent 50%);

animation:auroraMove 18s infinite alternate linear;
z-index:0;
}

@keyframes auroraMove{
0%{background-position:20% 40%,80% 70%,50% 0%}
100%{background-position:30% 50%,70% 80%,60% 10%}
}

/* ===== BOOKSHELF BACKGROUND ===== */

.bookshelf{
position:fixed;
bottom:0;
left:0;
width:100%;
height:160px;

background:
repeating-linear-gradient(
90deg,
rgba(128,0,0,0.08) 0px,
rgba(128,0,0,0.08) 6px,
transparent 6px,
transparent 30px
);

z-index:0;
}

/* ===== FLOATING PAGES ===== */

.page{
position:fixed;
font-size:28px;
opacity:0.15;
animation:floatPage linear infinite;
z-index:0;
}

.page:nth-child(1){
left:10%;
top:80%;
animation-duration:18s;
}

.page:nth-child(2){
left:85%;
top:75%;
animation-duration:20s;
}

.page:nth-child(3){
left:50%;
top:85%;
animation-duration:22s;
}

@keyframes floatPage{

0%{
transform:translateY(0) rotate(0deg);
opacity:0.15;
}

50%{
opacity:0.25;
}

100%{
transform:translateY(-900px) rotate(360deg);
opacity:0;
}

}

/* ===== FLORAL ORNAMENT ===== */

.floral{
position:fixed;
width:260px;
height:260px;
opacity:0.05;
z-index:0;
pointer-events:none;

background:
radial-gradient(circle,#800000 2px,transparent 2px) 0 0/40px 40px,
radial-gradient(circle,#800000 1px,transparent 1px) 20px 20px/40px 40px;
}

.floral1{
top:20%;
left:5%;
}

.floral2{
bottom:15%;
right:8%;
}

/* ===== MAIN CONTAINER ===== */

.admin-wrapper{
position:relative;
z-index:2;
text-align:center;
max-width:820px;
width:100%;
}

/* ===== TITLE ===== */

h1{
color:#800000;
font-size:36px;
margin-bottom:30px;
text-shadow:0 8px 18px rgba(0,0,0,0.18);
}

/* ===== ADMIN CARD ===== */

.admin-card{

padding:36px;

border-radius:22px;

background:rgba(255,255,255,0.88);
backdrop-filter:blur(12px);

border:2px solid #e6d5b8;

box-shadow:0 20px 50px rgba(0,0,0,0.15);

transition:all .35s ease;

}

.admin-card:hover{
transform:translateY(-8px) scale(1.02);
}

/* ===== PHOTO ===== */

.admin-card img{

width:170px;
height:170px;

border-radius:50%;
object-fit:cover;

border:4px solid #800000;

margin-bottom:16px;

box-shadow:0 12px 30px rgba(0,0,0,0.3);

}

/* ===== TEXT ===== */

.admin-card h3{
font-size:24px;
color:#800000;
margin-bottom:6px;
}

.admin-card p{
color:#333;
line-height:1.6;
margin-bottom:10px;
}

/* ===== BUTTONS ===== */

.admin-links{
margin-top:12px;
}

.admin-links a{

display:inline-block;

margin:8px;

background:#800000;

color:#fff;

padding:10px 18px;

border-radius:22px;

text-decoration:none;

font-weight:700;

transition:.25s;

}

.admin-links a:hover{

background:#a52a2a;

transform:translateY(-2px);

box-shadow:0 6px 14px rgba(0,0,0,0.25);

}

/* ===== VIDEO ===== */

iframe{

width:100%;
max-width:720px;
height:400px;

border:none;

border-radius:12px;

margin-top:20px;

box-shadow:0 10px 25px rgba(0,0,0,0.18);

}

/* ===== BACK BUTTON ===== */

.back{

display:inline-block;

margin-top:28px;

color:#800000;

font-weight:600;

text-decoration:none;

}

.back:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<div class="bookshelf"></div>

<div class="page">📖</div>
<div class="page">📄</div>
<div class="page">📚</div>

<div class="floral floral1"></div>
<div class="floral floral2"></div>

<div class="admin-wrapper">

<h1>Tentang Admin</h1>

<div class="admin-card">

<img src="07a8ce95-374a-430e-8d2e-14e61bb59e83.jpg" alt="Admin">

<h3>Rayhana</h3>

<p><strong>Mahasiswa | Pencinta Buku | Pengembang Digital Library</strong></p>

<p>

</p>

</div>

</div>

<a href="index.html" class="back">← Back to Home</a>

</div>

</body>
</html>
