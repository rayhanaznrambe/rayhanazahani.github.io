<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin - Source Library</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:"Outfit",system-ui;
background:linear-gradient(180deg,#faf6f0,#f4eee5);
min-height:100vh;
padding:80px 20px;
display:flex;
justify-content:center;
overflow-x:hidden;
position:relative;
}

/* Aurora background */

body::before{
content:"";
position:fixed;
inset:0;

background:
radial-gradient(circle at 20% 40%, rgba(180,220,255,0.15), transparent 35%),
radial-gradient(circle at 80% 70%, rgba(255,200,240,0.12), transparent 40%),
radial-gradient(circle at 50% 10%, rgba(230,213,184,0.20), transparent 40%);

animation:auroraMove 16s infinite alternate linear;
z-index:0;
}

@keyframes auroraMove{
0%{background-position:15% 35%,85% 70%,50% 10%}
100%{background-position:25% 45%,75% 75%,60% 20%}
}

/* decoration */

.decor{
position:fixed;
opacity:0.08;
z-index:0;
pointer-events:none;
}

.book1{
top:120px;
left:40px;
width:180px;
transform:rotate(-10deg);
}

.book2{
bottom:100px;
right:60px;
width:200px;
transform:rotate(12deg);
}

.flower1{
top:60%;
left:8%;
width:160px;
}

.flower2{
top:10%;
right:10%;
width:140px;
}

/* container */

.admin-wrapper{
position:relative;
z-index:2;
text-align:center;
max-width:820px;
width:100%;
}

/* title */

h1{
color:#800000;
font-size:36px;
margin-bottom:30px;
text-shadow:0 8px 18px rgba(0,0,0,0.18);
}

/* card */

.admin-card{
padding:34px;
border-radius:20px;
background:rgba(255,255,255,0.85);
backdrop-filter:blur(10px);
border:2px solid #e6d5b8;
box-shadow:0 18px 45px rgba(0,0,0,0.12);
transition:all .35s ease;
}

.admin-card:hover{
transform:translateY(-6px) scale(1.01);
}

/* photo */

.admin-card img{
width:170px;
height:170px;
border-radius:50%;
object-fit:cover;
border:4px solid #800000;
margin-bottom:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* text */

.admin-card h3{
font-size:24px;
color:#800000;
margin-bottom:6px;
}

.admin-card p{
color:#333;
line-height:1.6;
margin-bottom:10px;
}

/* links */

.admin-links{
margin-top:12px;
}

.admin-links a{
display:inline-block;
margin:8px;
background:#800000;
color:#fff;
padding:10px 18px;
border-radius:22px;
text-decoration:none;
font-weight:700;
transition:all .25s ease;
}

.admin-links a:hover{
background:#a52a2a;
transform:translateY(-2px);
box-shadow:0 6px 14px rgba(0,0,0,0.25);
}

/* video */

iframe{
width:100%;
max-width:720px;
height:400px;
border:none;
border-radius:12px;
margin-top:18px;
box-shadow:0 8px 20px rgba(0,0,0,0.18);
}

/* back button */

.back{
display:inline-block;
margin-top:28px;
color:#800000;
font-weight:600;
text-decoration:none;
font-size:15px;
}

.back:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<img class="decor book1" src="https://cdn-icons-png.flaticon.com/512/29/29302.png">
<img class="decor book2" src="https://cdn-icons-png.flaticon.com/512/29/29302.png">
<img class="decor flower1" src="https://cdn-icons-png.flaticon.com/512/616/616408.png">
<img class="decor flower2" src="https://cdn-icons-png.flaticon.com/512/616/616408.png">

<div class="admin-wrapper">

<h1>Tentang Admin</h1>

<div class="admin-card">

<img src="07a8ce95-374a-430e-8d2e-14e61bb59e83.jpg" alt="Admin">

<h3>Rayhana</h3>

<p><strong>Mahasiswa | Pencinta Buku | Pengembang Digital Library</strong></p>

<p>
Saya membangun Source Library sebagai sarana berbagi pengetahuan umum
dan koleksi yang banyak diminati oleh masyarakat luas.
</p>

<div class="admin-links">

<a href="https://drive.google.com/file/d/1Yyq5G2NVMEAMi58CoMcuqb17KJydHpoU/view?usp=drive_link" target="_blank">
View CV
</a>

<a href="https://www.instagram.com/rayhana_znrr" target="_blank">
Instagram
</a>

</div>

<iframe src="https://www.youtube.com/embed/4w13jP-cshM" allowfullscreen></iframe>

</div>

<a href="index.html" class="back">← Back to Home</a>

</div>

</body>
</html>
