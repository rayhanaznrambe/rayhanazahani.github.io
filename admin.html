<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Source Library</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:"Outfit",sans-serif;
min-height:100vh;

background:
radial-gradient(circle at 20% 20%, #f6e6d6 0%, transparent 40%),
radial-gradient(circle at 80% 70%, #e9ddff 0%, transparent 40%),
linear-gradient(#faf6f0,#efe7de);

display:flex;
align-items:center;
justify-content:center;

padding:80px 20px;
}

/* floral ornament */

.floral-left{
position:fixed;
top:0;
left:0;
width:220px;
opacity:.08;
}

.floral-right{
position:fixed;
bottom:0;
right:0;
width:220px;
opacity:.08;
transform:rotate(180deg);
}

/* decorative books */

.book{
position:fixed;
width:120px;
opacity:.06;
}

.book.left{
top:40%;
left:40px;
}

.book.right{
bottom:40%;
right:40px;
}

/* container */

.wrapper{
max-width:820px;
width:100%;
text-align:center;
}

/* title */

h1{
font-size:38px;
color:#800000;
margin-bottom:30px;
}

/* glass card */

.card{

padding:40px;

border-radius:24px;

background:rgba(255,255,255,0.7);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,0.6);

box-shadow:
0 30px 70px rgba(0,0,0,.15);

transition:.3s;
}

.card:hover{
transform:translateY(-6px);
}

/* photo */

.card img{

width:170px;
height:170px;

border-radius:50%;

object-fit:cover;

border:4px solid #800000;

margin-bottom:15px;

box-shadow:0 10px 30px rgba(0,0,0,.25);
}

/* text */

.card h3{
font-size:26px;
color:#800000;
}

.card p{
color:#444;
margin-top:6px;
line-height:1.6;
}

/* buttons */

.links{
margin-top:15px;
}

.links a{

display:inline-block;

margin:8px;

background:#800000;

color:white;

padding:10px 22px;

border-radius:30px;

font-weight:600;

text-decoration:none;

transition:.25s;
}

.links a:hover{
background:#a52a2a;
transform:translateY(-2px);
}

/* video */

iframe{

width:100%;
height:400px;

margin-top:22px;

border:none;

border-radius:14px;

box-shadow:0 10px 30px rgba(0,0,0,.2);
}

/* back */

.back{

display:inline-block;

margin-top:25px;

color:#800000;

font-weight:600;

text-decoration:none;
}

.back:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<img class="floral-left" src="https://upload.wikimedia.org/wikipedia/commons/3/3f/Floral_ornament.svg">
<img class="floral-right" src="https://upload.wikimedia.org/wikipedia/commons/3/3f/Floral_ornament.svg">

<img class="book left" src="https://cdn-icons-png.flaticon.com/512/2232/2232688.png">
<img class="book right" src="https://cdn-icons-png.flaticon.com/512/2232/2232688.png">

<div class="wrapper">

<h1>Tentang Admin</h1>

<div class="card">

<img src="07a8ce95-374a-430e-8d2e-14e61bb59e83.jpg">

<h3>Rayhana</h3>

<p><strong>Mahasiswa | Pencinta Buku | Pengembang Digital Library</strong></p>

</div>

</div>

</body>
</html>
