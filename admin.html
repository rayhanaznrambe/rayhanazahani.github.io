<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Source Library</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:"Outfit",sans-serif;

background:
radial-gradient(circle at 20% 20%, #f5e7d8 0%, transparent 40%),
radial-gradient(circle at 80% 70%, #f0e0ff 0%, transparent 40%),
linear-gradient(#faf6f0,#f2ebe3);

min-height:100vh;

display:flex;
align-items:center;
justify-content:center;

padding:80px 20px;

}

/* decorative pattern */

body::before{

content:"";

position:fixed;

inset:0;

background-image:
radial-gradient(#80000022 1px, transparent 1px);

background-size:40px 40px;

opacity:.4;

z-index:0;

}

/* container */

.wrapper{

position:relative;

z-index:1;

text-align:center;

max-width:820px;

width:100%;

}

/* title */

h1{

font-size:38px;

color:#800000;

margin-bottom:30px;

}

/* card */

.card{

padding:40px;

border-radius:24px;

background:rgba(255,255,255,0.75);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,0.5);

box-shadow:

0 30px 60px rgba(0,0,0,.15);

transition:.3s;

}

.card:hover{

transform:translateY(-6px);

}

/* photo */

.card img{

width:170px;

height:170px;

border-radius:50%;

object-fit:cover;

border:4px solid #800000;

margin-bottom:16px;

box-shadow:0 10px 30px rgba(0,0,0,.3);

}

/* name */

.card h3{

font-size:26px;

color:#800000;

margin-bottom:6px;

}

.card p{

color:#444;

line-height:1.6;

margin-bottom:10px;

}

/* buttons */

.links{

margin-top:15px;

}

.links a{

display:inline-block;

margin:8px;

background:#800000;

color:#fff;

padding:10px 20px;

border-radius:25px;

font-weight:600;

text-decoration:none;

transition:.25s;

}

.links a:hover{

background:#a52a2a;

transform:translateY(-2px);

}

/* video */

iframe{

width:100%;

height:400px;

margin-top:20px;

border:none;

border-radius:14px;

box-shadow:0 10px 30px rgba(0,0,0,.2);

}

/* back */

.back{

display:inline-block;

margin-top:25px;

color:#800000;

font-weight:600;

text-decoration:none;

}

.back:hover{

text-decoration:underline;

}

/* decorative books */

.books{

position:absolute;

font-size:120px;

opacity:.05;

top:-40px;

right:-20px;

}

.books2{

position:absolute;

font-size:120px;

opacity:.05;

bottom:-40px;

left:-20px;

}

</style>
</head>

<body>

<div class="wrapper">

<div class="books">📚</div>
<div class="books2">📖</div>

<h1>Tentang Admin</h1>

<div class="card">

<img src="07a8ce95-374a-430e-8d2e-14e61bb59e83.jpg">

<h3>Rayhana</h3>

<p><strong>Mahasiswa | Pencinta Buku | Pengembang Digital Library</strong></p>

<p>
Saya membangun Source Library sebagai sarana berbagi pengetahuan umum
dan koleksi yang banyak diminati oleh masyarakat luas.
</p>

</div>

<iframe src="https://www.youtube.com/embed/4w13jP-cshM" allowfullscreen></iframe>

</div>

<a class="back" href="index.html">← Back to Home</a>

</div>

</body>
</html>
