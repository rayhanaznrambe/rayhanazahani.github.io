<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Source Library - Katalog</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* BODY */

body{
margin:0;
padding:40px;
font-family:'Inter',sans-serif;
background:linear-gradient(180deg,#f7efe5,#efe2d2);
color:#4b0f0f;
}

/* HEADER */

.header{
text-align:center;
margin-bottom:30px;
}

.header h1{
font-family:'Playfair Display',serif;
font-size:44px;
color:#7a1c1c;
margin-bottom:8px;
}

.subtitle{
color:#7b6b5d;
font-size:14px;
}

/* BACK BUTTON */

.back{
position:absolute;
left:40px;
top:40px;

background:#7a1c1c;
color:white;
padding:8px 18px;
border-radius:20px;
text-decoration:none;
font-size:13px;
transition:0.3s;
}

.back:hover{
background:#4b0f0f;
}

/* SEARCH */

.search-box{
display:flex;
justify-content:center;
margin:35px 0;
}

.search-box input{

width:420px;
max-width:90%;
padding:14px 20px;

border-radius:30px;
border:none;

background:white;

box-shadow:0 6px 20px rgba(0,0,0,0.08);

font-size:15px;
outline:none;

}

/* CATEGORY FILTER */

.categories{

display:flex;

gap:10px;

justify-content:center;

flex-wrap:wrap;

margin-bottom:25px;

}

.category{

background:white;

padding:8px 16px;

border-radius:20px;

font-size:13px;

cursor:pointer;

box-shadow:0 4px 10px rgba(0,0,0,0.08);

transition:0.25s;

}

.category:hover{

background:#7a1c1c;

color:white;

}

/* BOOK GRID */

.book-container{

display:grid;

grid-template-columns:repeat(auto-fill,minmax(190px,1fr));

gap:28px;

margin-top:20px;

}

/* BOOK CARD */

.book-card{

background:white;

border-radius:14px;

overflow:hidden;

box-shadow:0 10px 22px rgba(0,0,0,0.08);

transition:0.35s;

cursor:pointer;

position:relative;

}

.book-card:hover{

transform:translateY(-10px) scale(1.04);

box-shadow:0 25px 45px rgba(0,0,0,0.15);

}

/* COVER */

.book-card img{

width:100%;

height:260px;

object-fit:cover;

transition:0.35s;

}

.book-card:hover img{

transform:scale(1.05);

}

/* INFO */

.book-info{

padding:16px;

text-align:center;

}

.book-title{

font-family:'Playfair Display',serif;

font-size:16px;

color:#7a1c1c;

margin-bottom:6px;

}

.book-author{

font-size:13px;

color:#666;

}

.book-year{

font-size:12px;

color:#999;

margin-bottom:10px;

}

/* BUTTON */

.book-btn{

background:#7a1c1c;

color:white;

padding:7px 14px;

border-radius:6px;

font-size:12px;

text-decoration:none;

display:inline-block;

transition:0.25s;

}

.book-btn:hover{

background:#4b0f0f;

}

/* MOBILE */

@media(max-width:700px){

body{
padding:25px;
}

.header h1{
font-size:32px;
}

}

</style>

</head>

<body>

<a href="index.html" class="back">← Home</a>

<div class="header">

<h1>📚 Source Library</h1>
<div class="subtitle">Digital Library Catalog</div>

</div>

<div class="search-box">

<input type="text" id="search" placeholder="Search books, authors, year...">

</div>

<div class="categories">

<div class="category" onclick="filterCategory('all')">All</div>
<div class="category" onclick="filterCategory('novel')">Novel</div>
<div class="category" onclick="filterCategory('akademik')">Academic</div>
<div class="category" onclick="filterCategory('sejarah')">History</div>
<div class="category" onclick="filterCategory('biografi')">Biography</div>
<div class="category" onclick="filterCategory('jurnal')">Journal</div>

</div>

<div id="bookList" class="book-container"></div>

<script src="books.js"></script>

<script>

let currentBooks = books;

displayBooks(books);

function displayBooks(data){

const list=document.getElementById("bookList");
list.innerHTML="";

data.forEach(book=>{

list.innerHTML+=`

<div class="book-card">

<img src="${book.cover}" alt="${book.judul}">

<div class="book-info">

<div class="book-title">${book.judul}</div>

<div class="book-author">${book.penulis}</div>

<div class="book-year">${book.tahun}</div>

<a class="book-btn" href="${book.file}" target="_blank">Read</a>

</div>

</div>

`;

});

}

function filterCategory(cat){

if(cat==="all"){

displayBooks(books);

}else{

const filtered=books.filter(b=>b.kategori===cat);

displayBooks(filtered);

}

}

/* SEARCH */

document.getElementById("search").addEventListener("input",function(){

const keyword=this.value.toLowerCase();

const results=books.filter(book=>

book.judul.toLowerCase().includes(keyword)||
book.penulis.toLowerCase().includes(keyword)||
book.tahun.includes(keyword)

);

displayBooks(results);

});

</script>

</body>

</html>
