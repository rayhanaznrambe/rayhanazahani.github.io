<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Katalog Buku - Source Library</title>

<style>

body{
font-family:'Segoe UI',sans-serif;
background:#faf6f0;
margin:0;
padding:40px;
}

/* HEADER */

.header{
text-align:center;
margin-bottom:30px;
}

.header h1{
color:#800000;
font-size:32px;
}

.back{
background:#800000;
color:white;
padding:8px 18px;
border-radius:20px;
text-decoration:none;
font-size:14px;
}

/* SEARCH */

.search-box{
display:flex;
justify-content:center;
margin:30px 0;
}

.search-box input{

width:400px;
max-width:90%;
padding:12px 18px;
border-radius:30px;
border:1px solid #ddd;
font-size:15px;

box-shadow:0 3px 10px rgba(0,0,0,0.1);

}

/* BOOK GRID */

.book-container{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(200px,1fr));

gap:25px;

margin-top:40px;

}

/* CARD */

.book-card{

background:white;

border-radius:12px;

padding:15px;

text-align:center;

box-shadow:0 5px 15px rgba(0,0,0,0.1);

transition:0.3s;

}

.book-card:hover{

transform:translateY(-6px);

}

.book-card img{

width:120px;

height:180px;

object-fit:cover;

border-radius:6px;

margin-bottom:10px;

}

.book-title{

font-weight:bold;

color:#800000;

margin-bottom:5px;

}

.book-author{

font-size:14px;

color:#555;

}

.book-year{

font-size:13px;

color:#777;

margin-bottom:10px;

}

.book-btn{

background:#800000;

color:white;

padding:6px 12px;

border-radius:6px;

text-decoration:none;

font-size:13px;

}

</style>

</head>

<body>


<div class="header">

<h1>📚 Katalog Buku</h1>

<a href="index.html" class="back">← Kembali</a>

</div>


<div class="search-box">

<input type="text" id="search" placeholder="Cari buku, penulis, tahun...">

</div>


<div id="bookList" class="book-container"></div>



<script src="books.js"></script>

<script>

/* AMBIL PARAMETER KATEGORI */

const params = new URLSearchParams(window.location.search);

const kategori = params.get("kategori");

let filteredBooks = books;


/* FILTER KATEGORI */

if(kategori){

filteredBooks = books.filter(b => b.kategori === kategori);

}


/* TAMPILKAN BUKU */

displayBooks(filteredBooks);


function displayBooks(data){

const list = document.getElementById("bookList");

list.innerHTML="";

data.forEach(book =>{

list.innerHTML += `

<div class="book-card">

<img src="${book.cover}">

<div class="book-title">${book.judul}</div>

<div class="book-author">${book.penulis}</div>

<div class="book-year">${book.tahun}</div>

<a class="book-btn" href="${book.file}" target="_blank">

Baca Buku

</a>

</div>

`;

});

}


/* SEARCH */

document.getElementById("search").addEventListener("input", function(){

const keyword = this.value.toLowerCase();

const results = books.filter(book =>

book.judul.toLowerCase().includes(keyword) ||

book.penulis.toLowerCase().includes(keyword) ||

book.tahun.includes(keyword)

);

displayBooks(results);

});

</script>

</body>
</html>
