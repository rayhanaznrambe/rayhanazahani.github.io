<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Katalog Buku - Source Library</title>

<style>

/* BODY */

body{
font-family:'Segoe UI',sans-serif;
background:#0f0f0f;
margin:0;
padding:40px;
color:white;
}

/* HEADER */

.header{
text-align:center;
margin-bottom:40px;
}

.header h1{
font-size:36px;
margin-bottom:10px;
}

.back{
background:#e50914;
color:white;
padding:8px 18px;
border-radius:20px;
text-decoration:none;
font-size:14px;
}

/* SEARCH */

.search-box{
display:flex;
justify-content:center;
margin:30px 0;
}

.search-box input{
width:420px;
max-width:90%;
padding:14px 20px;
border-radius:30px;
border:none;
font-size:15px;
background:#1c1c1c;
color:white;
outline:none;
}

.search-box input::placeholder{
color:#888;
}

/* BOOK GRID */

.book-container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:28px;
margin-top:40px;
}

/* CARD */

.book-card{
background:#1a1a1a;
border-radius:10px;
overflow:hidden;
transition:0.35s;
cursor:pointer;
}

.book-card:hover{
transform:scale(1.08);
z-index:2;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

/* COVER */

.book-card img{
width:100%;
height:260px;
object-fit:cover;
}

/* INFO */

.book-info{
padding:14px;
text-align:center;
}

.book-title{
font-weight:600;
font-size:15px;
margin-bottom:5px;
}

.book-author{
font-size:13px;
color:#aaa;
}

.book-year{
font-size:12px;
color:#777;
margin-bottom:10px;
}

/* BUTTON */

.book-btn{
background:#e50914;
color:white;
padding:6px 12px;
border-radius:6px;
text-decoration:none;
font-size:12px;
display:inline-block;
margin-top:5px;
}

.book-btn:hover{
background:#ff1e28;
}

</style>

</head>

<body>


<div class="header">

<h1>📚 Katalog Buku</h1>

<a href="index.html" class="back">← Kembali</a>

</div>


<div class="search-box">

<input type="text" id="search" placeholder="Cari judul buku, penulis, atau tahun...">

</div>


<div id="bookList" class="book-container"></div>


<script src="books.js"></script>

<script>

/* AMBIL PARAMETER KATEGORI */

const params = new URLSearchParams(window.location.search);

const kategori = params.get("kategori");

let filteredBooks = books;


/* FILTER BERDASARKAN KATEGORI */

if(kategori){

filteredBooks = books.filter(b => b.kategori === kategori);

}


/* TAMPILKAN BUKU */

displayBooks(filteredBooks);


function displayBooks(data){

const list = document.getElementById("bookList");

list.innerHTML="";

data.forEach(book =>{

list.innerHTML += `

<div class="book-card">

<img src="${book.cover}" alt="${book.judul}">

<div class="book-info">

<div class="book-title">${book.judul}</div>

<div class="book-author">${book.penulis}</div>

<div class="book-year">${book.tahun}</div>

<a class="book-btn" href="${book.file}" target="_blank">

Baca Buku

</a>

</div>

</div>

`;

});

}


/* SEARCH */

document.getElementById("search").addEventListener("input", function(){

const keyword = this.value.toLowerCase();

const results = books.filter(book =>

book.judul.toLowerCase().includes(keyword) ||

book.penulis.toLowerCase().includes(keyword) ||

book.tahun.includes(keyword)

);

displayBooks(results);

});

</script>

</body>

</html>
