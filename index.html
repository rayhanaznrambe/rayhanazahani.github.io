<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Source Library</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Cinzel:wght@500;600&display=swap');

*{box-sizing:border-box;margin:0;padding:0}

html,body{
height:100%;
scroll-behavior:smooth
}

body{
font-family:"Outfit",system-ui,-apple-system,Segoe UI,Roboto;
background:linear-gradient(180deg,#faf6f0,#f3e9dd);
color:#2a2a2a;
display:flex;
flex-direction:column;
min-height:100vh;
overflow-x:hidden;
}

/* ambient particles */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
background-image:
radial-gradient(circle at 20% 30%, rgba(230,213,184,0.15) 1px, transparent 1px),
radial-gradient(circle at 70% 60%, rgba(255,255,255,0.08) 1px, transparent 1px);
background-size:120px 120px;
animation:particlesMove 60s linear infinite;
z-index:0;
}

@keyframes particlesMove{
0%{background-position:0 0,0 0}
100%{background-position:1000px 1000px,-1000px -1000px}
}

/* NAVBAR */

nav{
position:sticky;
top:0;
z-index:50;
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 48px;
background:linear-gradient(180deg,#800000,#6b0000);
color:#fff;
border-bottom:6px solid #e6d5b8;
box-shadow:0 10px 30px rgba(0,0,0,0.35);
}

.logo-container{
display:flex;
align-items:center;
gap:12px
}

.logo-container img{
height:44px;
width:44px;
border-radius:8px;
object-fit:contain;
background:rgba(255,255,255,0.12);
border:2px solid #e6d5b8;
padding:3px;
transition:transform .25s ease
}

.logo-container img:hover{
transform:scale(1.06) rotate(3deg)
}

.logo-container h1{
font-size:22px;
font-weight:700;
font-family:"Cinzel",serif;
color:#fff
}

nav ul{
list-style:none;
display:flex;
gap:28px;
align-items:center
}

nav a{
text-decoration:none;
color:#f8f8f8;
font-weight:600;
transition:all .22s
}

nav a:hover{
color:#e6d5b8;
text-shadow:0 0 6px rgba(230,213,184,.8)
}

/* HERO */

.hero{
position:relative;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
overflow:hidden
}

.hero img{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:opacity 1.6s ease-in-out
}

.hero img.active{opacity:1}

.hero::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(180deg,rgba(0,0,0,0.3),rgba(0,0,0,0.7));
z-index:2;
pointer-events:none;
}

.hero-content{
position:relative;
z-index:3;
max-width:920px;
width:calc(100% - 60px);
padding:48px;
border-radius:20px;
background:rgba(255,255,255,0.06);
border:2px solid rgba(230,213,184,0.28);
backdrop-filter:blur(14px);
box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

.hero h2{
font-size:60px;
font-family:"Cinzel",serif;
background:linear-gradient(90deg,#fff,#e6d5b8);
-webkit-background-clip:text;
color:transparent
}

.hero p{
font-size:19px;
color:#f2e4cc;
margin-top:12px
}

/* BUTTON */

.btn{
margin-top:28px;
padding:14px 40px;
border-radius:50px;
border:0;
background:linear-gradient(90deg,#e6d5b8,#fff);
color:#7b1f1f;
font-weight:700;
cursor:pointer;
font-size:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.36);
transition:transform .22s
}

.btn:hover{
transform:translateY(-4px) scale(1.05)
}

/* ===== RECOMMENDED BOOKS ===== */

#recommended{
background:#faf6f0;
text-align:center;
padding:80px 20px
}

#recommended h2{
color:#800000;
font-size:36px;
font-family:"Cinzel",serif;
margin-bottom:30px
}

.book-scroll{
display:flex;
gap:20px;
overflow-x:auto;
padding:20px 40px
}

.book-card{
min-width:180px;
background:#fff;
border-radius:14px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
cursor:pointer;
transition:.25s
}

.book-card:hover{
transform:translateY(-6px)
}

.book-card img{
width:100%;
height:250px;
object-fit:cover
}

.book-info{
padding:12px;
text-align:left
}

.book-info h4{
font-size:15px;
color:#800000
}

.book-info p{
font-size:13px;
color:#555
}

/* ===== ABOUT ===== */

section{padding:80px 20px}

#about{
background:#fff;
text-align:center
}

#about h2{
color:#800000;
font-size:36px;
font-family:"Cinzel",serif;
margin-bottom:18px
}

#about p{
max-width:880px;
margin:0 auto;
line-height:1.75;
color:#333;
font-size:17px
}

.profile-toggle{
margin-top:20px;
padding:12px 28px;
border-radius:30px;
border:2px solid #800000;
background:transparent;
color:#800000;
font-weight:700;
cursor:pointer;
transition:.25s
}

.profile-toggle:hover{
background:#800000;
color:#fff
}

.library-profile{
max-width:900px;
margin:30px auto 0;
padding:24px;
border-radius:16px;
background:#faf6f0;
border:1px solid #e6d5b8;
display:none;
opacity:0;
transform:translateY(20px);
transition:.5s
}

.library-profile.show{
display:block;
opacity:1;
transform:translateY(0)
}

/* FOOTER */

footer{
background:linear-gradient(180deg,#4d0000,#800000);
color:#e6d5b8;
padding:50px 20px 30px;
border-top:6px solid #e6d5b8;
margin-top:auto
}

.footer-grid{
max-width:1100px;
margin:0 auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:28px
}

.footer-col h3{
color:#fff;
margin-bottom:12px;
font-size:18px;
font-family:"Cinzel",serif
}

.footer-bottom{
text-align:center;
color:#fff;
font-size:13px;
margin-top:22px
}

</style>
</head>

<body>

<nav>
<div class="logo-container">
<img src="logorayhana.png">
<h1>Source Library</h1>
</div>
</nav>

<section id="beranda" class="hero">
<img src="https://images.unsplash.com/photo-1519682337058-a94d519337bc?auto=format&fit=crop&w=1600&q=80" class="active">
<img src="https://images.unsplash.com/photo-1495446815901-a7297e633e8d?auto=format&fit=crop&w=1600&q=80">
<img src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?auto=format&fit=crop&w=1600&q=80">
</section>

<!-- RECOMMENDED BOOKS -->
<section id="recommended">
<h2>Recommended Books</h2>
<div class="book-scroll" id="recommendContainer"></div>
</section>

<section id="about">
<h2>About Source Library</h2>
<p>Source Library adalah perpustakaan umum digital yang terbuka untuk semua masyarakat dalam mengakses informasi yang aktual.</p>
</section>

<footer>
<div class="footer-bottom">
<p>© 2026 <strong>Source Library</strong></p>
</div>
</footer>

<script src="books.js"></script>

<script>

const heroImages=document.querySelectorAll(".hero img");
let current=0;

setInterval(()=>{
heroImages[current].classList.remove("active");
current=(current+1)%heroImages.length;
heroImages[current].classList.add("active");
},5000);

/* RECOMMENDED BOOKS */

const recommendContainer=document.getElementById("recommendContainer");

if(typeof books!=="undefined"){

books.slice(0,10).forEach(book=>{

const card=document.createElement("div");
card.className="book-card";

card.innerHTML=`
<img src="${book.cover}">
<div class="book-info">
<h4>${book.judul}</h4>
<p>${book.penulis}</p>
</div>
`;

card.onclick=()=>window.open(book.file,"_blank");

recommendContainer.appendChild(card);

});

}

</script>

</body>
</html>
