<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Source Library</title>

<style>

body{
font-family: Arial, sans-serif;
background:#faf6f0;
margin:0;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
color:#800000;
margin-bottom:10px;
}

p{
color:#444;
}

input, textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

button{
margin-top:15px;
padding:10px 25px;
background:#800000;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#a00000;
}

.comment-section{
margin-top:35px;
}

.comment{
background:#f3f3f3;
padding:12px;
border-radius:6px;
margin-top:10px;
}

.comment strong{
color:#800000;
}

</style>
</head>

<body>

<div class="container">

<h1>Contact & Feedback</h1>

<p>Silakan kirim komentar atau masukan untuk Source Library.</p>

<input type="text" id="name" placeholder="Nama Anda">

<textarea id="message" rows="4" placeholder="Tulis komentar..."></textarea>

<button onclick="addComment()">Kirim</button>

<div class="comment-section">

<h2>Komentar Pengunjung</h2>

<div id="commentList"></div>

</div>

</div>

<script>

let comments = JSON.parse(localStorage.getItem("comments")) || [];

function showComments(){

let list = document.getElementById("commentList");

list.innerHTML = "";

comments.forEach(function(comment){

let div = document.createElement("div");

div.className = "comment";

div.innerHTML = "<strong>" + comment.name + "</strong><br>" + comment.message;

list.appendChild(div);

});

}

function addComment(){

let name = document.getElementById("name").value;

let message = document.getElementById("message").value;

if(name === "" || message === ""){
alert("Isi nama dan komentar terlebih dahulu");
return;
}

let newComment = {
name: name,
message: message
};

comments.push(newComment);

localStorage.setItem("comments", JSON.stringify(comments));

showComments();

document.getElementById("name").value = "";
document.getElementById("message").value = "";

}

showComments();

</script>

</body>
</html>
